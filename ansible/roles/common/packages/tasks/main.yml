---
- name: 백그라운드 자동 업데이트 서비스 중지 (APT 락 방지)
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - unattended-upgrades
    - apt-daily.service
    - apt-daily-upgrade.service
  failed_when: false # 서비스가 없더라도 에러 무시

- name: APT 캐시 업데이트 및 필수 유틸리티 패키지 설치
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
    state: present
    update_cache: yes
    lock_timeout: 300
