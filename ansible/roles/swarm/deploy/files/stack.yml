version: '3.8'
services:
  board:
    image: ${BOARD_IMAGE:-jaeyun1/board:blue}
    ports:
      - target: 3000
        published: 80
        mode: host
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      # 💡 [필수 추가] Ansible이 주입한 Secret 파일들을 웹 소스코드가 읽을 수 있도록 환경변수 경로를 연결합니다.
      DB_TYPE_FILE: /run/secrets/db_type
      DB_HOST_FILE: /run/secrets/db_primary_host
      DB_PORT_FILE: /run/secrets/db_primary_port
      DB_USER_FILE: /run/secrets/db_user
      DB_PASSWORD_FILE: /run/secrets/db_password
      DB_NAME_FILE: /run/secrets/db_name
    secrets:
      - source: db_type
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_primary_host
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_primary_port
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_user
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_password
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_name
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_replica_hosts
        mode: 0440
        uid: '0'
        gid: '1000'
    deploy:
      mode: replicated
      replicas: 2
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.labels.role == was
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      # 💡 [안정성 패치] wget 대신 curl을 쓰거나, /health 경로가 없다면 루트 경로(/)를 찌르도록 변경해야 안전합니다.
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
secrets:
  db_type:
    external: true
  db_primary_host:
    external: true
  db_primary_port:
    external: true
  db_user:
    external: true
  db_password:
    external: true
  db_name:
    external: true
  db_replica_hosts:
    external: true
