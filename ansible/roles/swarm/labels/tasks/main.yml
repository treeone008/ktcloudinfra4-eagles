---
- name: Set node labels
  block:
    - name: Label leader node
      shell: docker node update --label-add role=leader swarm-mg

    - name: Label swarm-mg2 as was
      shell: docker node update --label-add role=was swarm-mg02

    - name: Label swarm-mg3 as was
      shell: docker node update --label-add role=was swarm-mg03

  rescue:
    - name: Remove labels on failure (Rollback)
      shell: |
        docker node update --label-rm role swarm-mg 2>/dev/null || true
        docker node update --label-rm role swarm-mg02 2>/dev/null || true
        docker node update --label-rm role swarm-mg03 2>/dev/null || true
      ignore_errors: yes

    - name: Fail with clear message
      fail:
        msg: "노드 라벨링(Tagging) 과정에서 에러가 발생했습니다. 클러스터 상태를 점검하세요."
