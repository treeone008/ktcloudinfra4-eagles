- name: Get service name
  shell: docker service ls --format '{{ "{{" }}.Name{{ "}}" }} {{ "{{" }}.Image{{ "}}" }}' | grep "{{ image_repo }}" | awk '{print $1}'
  register: service_name

- name: Get latest image tag
  shell: |
    curl -s "https://hub.docker.com/v2/repositories/{{ image_repo }}/tags?page_size=1&ordering=last_updated" | python3 -c "import sys,json; print(json.load(sys.stdin)['results'][0]['name'])"
  register: latest_tag

- name: Get current image tag
  shell: docker service inspect {{ service_name.stdout }} --format '{{ "{{" }}.Spec.TaskTemplate.ContainerSpec.Image{{ "}}" }}' | cut -d':' -f2
  register: current_tag

- name: Update if tag changed
  when: latest_tag.stdout != current_tag.stdout
  block:
    - name: Rolling update
      shell: docker service update --detach=true --image {{ image_repo }}:{{ latest_tag.stdout }} {{ service_name.stdout }}

    - name: Wait for update to complete
      shell: |
        for i in $(seq 1 10); do
          RUNNING=$(sudo docker service ps {{ service_name.stdout }} --filter "desired-state=running" --format '{{ "{{" }}.Image{{ "}}" }} {{ "{{" }}.CurrentState{{ "}}" }}' | grep "{{ latest_tag.stdout }}" | grep -c "Running")
          if [ "$RUNNING" -ge 2 ]; then
            exit 0
          fi
          sleep 10
        done
        exit 1

  rescue:
    - name: Rollback on failure
      shell: docker service rollback {{ service_name.stdout }}

