- name: Deploy stack
  block:
    - name: Create secrets
      shell: |
        docker secret inspect db_type > /dev/null 2>&1 || echo -n "{{ db_type }}" | docker secret create db_type -
        docker secret inspect db_primary_host > /dev/null 2>&1 || echo -n "{{ db_primary_host }}" | docker secret create db_primary_host -
        docker secret inspect db_primary_port > /dev/null 2>&1 || echo -n "{{ db_primary_port }}" | docker secret create db_primary_port -
        docker secret inspect db_user > /dev/null 2>&1 || echo -n "{{ db_user }}" | docker secret create db_user -
        docker secret inspect db_password > /dev/null 2>&1 || echo -n "{{ db_password }}" | docker secret create db_password -
        docker secret inspect db_name > /dev/null 2>&1 || echo -n "{{ db_name }}" | docker secret create db_name -
        docker secret inspect db_replica_hosts > /dev/null 2>&1 || echo "" | docker secret create db_replica_hosts -

    - name: Copy stack file
      copy:
        src: stack.yml
        dest: /tmp/stack.yml

    - name: Deploy stack
      shell: docker stack deploy -c /tmp/stack.yml board

    - name: Wait for services to be running
      shell: |
        for i in $(seq 1 6); do
          RUNNING=$(sudo docker stack ps board --filter "desired-state=running" --format '{{ "{{" }}.CurrentState{{ "}}" }}' | grep -c "Running")
          if [ "$RUNNING" -ge 2 ]; then
            exit 0
          fi
          sleep 10
        done
        exit 1
      retries: 2
      delay: 5

  rescue:
    - name: Remove stack on failure
      shell: docker stack rm board
      ignore_errors: yes

    - name: Remove secrets on failure
      shell: |
        docker secret rm db_type db_primary_host db_primary_port db_user db_password db_name db_replica_hosts 2>/dev/null || true
