---
- name: Ensure down_nodes list is valid for recovery2 (2 nodes down)
  run_once: true
  delegate_to: localhost
  assert:
    that:
      - down_nodes is defined
      - down_nodes | type_debug == 'list'
      - down_nodes | length == 2
      - (down_nodes | map(attribute='name') | list | difference(groups['swarm_managers'] | default([])) | length) == 0
    fail_msg: >-
      recovery2는 2대의 장애 노드가 리스트(down_nodes) 형태로 전달되어야 하며,
      해당 노드들은 인벤토리의 [swarm_managers] 그룹에 속해 있어야 합니다.

- name: Set target down nodes list
  run_once: true
  delegate_to: localhost
  set_fact:
    target_down_nodes: "{{ down_nodes | map(attribute='name') | list }}"
  delegate_facts: true

- name: Determine the surviving node
  run_once: true
  delegate_to: localhost
  set_fact:
    surviving_node_hostname: "{{ (groups['swarm_managers'] | difference(hostvars['localhost'].target_down_nodes)) | first }}"
  delegate_facts: true

- name: Print recovery plan
  run_once: true
  debug:
    msg: >-
      생존 노드: {{ hostvars['localhost'].surviving_node_hostname }}
      / 재생성된 노드: {{ hostvars['localhost'].target_down_nodes | join(', ') }}

- name: Recover swarm on the surviving node
  when: inventory_hostname == hostvars['localhost'].surviving_node_hostname
  block:
    - name: Check whether the swarm still has a reachable leader
      become: true
      command: docker node ls
      register: quorum_check
      changed_when: false
      ignore_errors: true

    - name: Abort if quorum is somehow still intact (avoid unnecessary force-new-cluster)
      when: quorum_check.rc == 0
      assert:
        that:
          - false
        fail_msg: >
          현재 노드에서 'docker node ls'가 정상 응답합니다 (쿼럼이 유지 중인 것으로 보입니다).

    - name: Force-new-cluster on the surviving node (uses its own live swarm state)
      become: true
      command: >
        docker swarm init --force-new-cluster --advertise-addr {{ ansible_host }}
      register: swarm_init_result
      changed_when: "'Swarm initialized' in swarm_init_result.stdout"

    - name: Retrieve manager join token
      become: true
      command: docker swarm join-token -q manager
      register: manager_join_token_result
      changed_when: false

- name: Share leader IP and join token globally
  when: inventory_hostname == hostvars['localhost'].surviving_node_hostname
  set_fact:
    new_leader_ip: "{{ ansible_host }}"
    manager_join_token: "{{ manager_join_token_result.stdout | trim }}"

- name: Rejoin the two recreated managers
  when: inventory_hostname in hostvars['localhost'].target_down_nodes
  block:
    - name: Ensure docker is running
      become: true
      systemd:
        name: docker
        state: started

    - name: Remove any pre-existing swarm state
      become: true
      file:
        path: "{{ docker_dir | default('/var/lib/docker') }}/swarm"
        state: absent

    - name: Restart docker to clear in-memory swarm state
      become: true
      systemd:
        name: docker
        state: restarted

    - name: Wait for docker to settle
      pause:
        seconds: 5

    - name: Join the new leader as manager
      become: true
      command: >
        docker swarm join --token {{ hostvars[hostvars['localhost'].surviving_node_hostname].manager_join_token }}
        {{ hostvars[hostvars['localhost'].surviving_node_hostname].new_leader_ip }}:2377
      register: swarm_join_result
      changed_when: "'This node joined a swarm' in swarm_join_result.stdout"

- name: Find hostnames that appear more than once (leftover ghosts)
  when: inventory_hostname == hostvars['localhost'].surviving_node_hostname
  become: true
  shell: "docker node ls --format '{% raw %}{{.Hostname}}{% endraw %}' | sort | uniq -d"
  register: duplicate_hostnames_result
  changed_when: false

- name: Remove non-Ready duplicate entries for each repeated hostname
  when:
    - inventory_hostname == hostvars['localhost'].surviving_node_hostname
    - duplicate_hostnames_result.stdout_lines | default([]) | length > 0
  become: true
  shell: |
    TARGET_HOST="{{ item }}"
    
    for id in $(docker node ls --format '{% raw %}{{.ID}} {{.Hostname}} {{.Status}}{% endraw %}' | \
      awk -v h="$TARGET_HOST" '$2==h && $3!="Ready" {print $1}'); do
      
      role=$(docker node inspect "$id" --format '{% raw %}{{.Spec.Role}}{% endraw %}' 2>/dev/null || echo "worker")
      
      if [ "$role" = "manager" ]; then
        is_leader=$(docker node inspect "$id" 2>/dev/null | grep -i '"Leader": true' || echo "")
        if [ -n "$is_leader" ]; then
          echo "Skipping leader node: $id"
          continue
        fi
        docker node demote "$id" || true
      fi
      
      if docker node rm --force "$id"; then
        echo "Successfully removed ghost node: $id"
      fi
    done
  args:
    executable: /bin/bash
  loop: "{{ duplicate_hostnames_result.stdout_lines | default([]) }}"
  register: ghost_cleanup_result
  changed_when: "'Successfully removed' in ghost_cleanup_result.stdout"

- name: Get surviving leader's own Docker node ID
  when: inventory_hostname == hostvars['localhost'].surviving_node_hostname
  become: true
  command: >
    docker node inspect self --format '{% raw %}{{.ID}}{% endraw %}'
  register: self_node_id_result
  changed_when: false

- name: Label self (leader) with role=leader
  when: inventory_hostname == hostvars['localhost'].surviving_node_hostname
  become: true
  command: docker node update --label-add role=leader {{ self_node_id_result.stdout | trim }}
  register: leader_label_out
  changed_when: "'is up-to-date' not in leader_label_out.stderr"

- name: List all node IDs currently in the cluster
  when: inventory_hostname == hostvars['localhost'].surviving_node_hostname
  become: true
  command: >
    docker node ls --format '{% raw %}{{.ID}}{% endraw %}'
  register: all_node_ids_result
  changed_when: false

- name: Label all other nodes with role=was
  when: inventory_hostname == hostvars['localhost'].surviving_node_hostname
  become: true
  command: docker node update --label-add role=was {{ item }}
  loop: >-
    {{
      all_node_ids_result.stdout_lines

      | reject('equalto', self_node_id_result.stdout | trim)
      | list
    }}
  register: was_label_out
  changed_when: "'is up-to-date' not in was_label_out.stderr"

- name: Final cluster verification
  when: inventory_hostname == hostvars['localhost'].surviving_node_hostname
  become: true
  command: docker node ls
  register: final_node_ls
  changed_when: false

- name: Print final cluster state
  when: inventory_hostname == hostvars['localhost'].surviving_node_hostname
  debug:
    var: final_node_ls.stdout_lines
