---
# мқҙ roleмқҖ swarm/find-leaderк°Җ лЁјм Җ мӢӨн–үлҗҳм–ҙ hostvars['localhost'].swarm_leader_hostname
# мқҙ мұ„мӣҢм ё мһҲлӢӨлҠ” м „м ңлЎң лҸҷмһ‘н•©лӢҲлӢӨ (site.ymlм—җм„ң мҲңм„ң ліҙмһҘ).
#
# мқёмҠӨн„ҙмҠӨк°Җ мқҙлҜё мӮӯм ңлҗҗлӢӨлҠ” м „м ңлқј SSHлЎң м ‘к·јн•  л°©лІ•мқҙ м—ҶмңјлҜҖлЎң,
# "м–ҙл–Ө л…ёл“ңк°Җ мӮӯм ңлҗҗлҠ”м§Җ"лҠ” мӮ¬лһҢмқҙ м§Җм •н•ҳм§Җ м•Ҡкі  лҰ¬лҚ”м—җм„ң
# docker node lsлЎң Status=Downмқё мӣҢм»ӨлҘј м°ҫм•„ мһҗлҸҷ нҢҗлі„н•©лӢҲлӢӨ.

- name: Find worker nodes and their status
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  become: true
  command: >
    docker node ls --filter role=worker --format '{% raw %}{{.ID}} {{.Status}}{% endraw %}'
  register: worker_status_result
  changed_when: false

- name: Extract IDs of down workers
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  set_fact:
    down_worker_ids: >-
      {{
        worker_status_result.stdout_lines
        | select('search', 'Down')
        | map('split', ' ')
        | map('first')
        | list
      }}

- name: Fail if no down worker was found (nothing to scale in)
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  assert:
    that:
      - down_worker_ids | length > 0
    fail_msg: >-
      Down мғҒнғңмқҳ worker л…ёл“ңлҘј м°ҫм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.
      мқёмҠӨн„ҙмҠӨк°Җ м •л§җ мӮӯм ң/лӢӨмҡҙлҗҗлҠ”м§Җ нҷ•мқён•ҳм„ёмҡ”.

- name: Print scale-in plan
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  debug:
    msg: "м ңкұ°н•  down worker л…ёл“ң ID: {{ down_worker_ids }}"

- name: Remove the down worker node(s) from the swarm
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  become: true
  command: docker node rm --force {{ item }}
  loop: "{{ down_worker_ids }}"
  register: node_rm_result
  changed_when: true

# stack нҢҢмқјмқ„ кө¬мЎ°м ҒмңјлЎң мқҪкі , replicasл§Ң м•Ҳм „н•ҳкІҢ -1 н•ҙм„ң лӢӨмӢң м”Җ
# мӣҗліё(source of truth)мқҖ м„ңлІ„к°Җ м•„лӢҲлқј Ansible м ҖмһҘмҶҢ м•Ҳмқҳ нҢҢмқјмһ…лӢҲлӢӨ.
- name: Read current stack file from the Ansible repo
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  delegate_to: localhost
  slurp:
    src: "{{ stack_file_repo_path }}"
  register: stack_file_raw

- name: Parse stack file
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  set_fact:
    stack_yaml: "{{ stack_file_raw.content | b64decode | from_yaml }}"

- name: Compute new replica count (never below the configured minimum)
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  set_fact:
    new_replica_count: >-
      {{
        [
          (stack_yaml.services[stack_service_name].deploy.replicas | int) - 1,
          scale_in_min_replicas | int
        ] | max
      }}

- name: Apply the decreased replica count
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  set_fact:
    updated_stack_yaml: >-
      {{
        stack_yaml | combine({
          'services': {
            stack_service_name: {
              'deploy': {
                'replicas': new_replica_count | int
              }
            }
          }
        }, recursive=True)
      }}

- name: Write updated stack file back to the Ansible repo (source of truth)
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  delegate_to: localhost
  copy:
    content: "{{ updated_stack_yaml | to_nice_yaml(indent=2) }}"
    dest: "{{ stack_file_repo_path }}"

- name: Copy updated stack file to the leader
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  copy:
    src: "{{ stack_file_repo_path }}"
    dest: "{{ stack_file_remote_path }}"

- name: Redeploy the stack with the decreased replica count
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  become: true
  command: docker stack deploy -c {{ stack_file_remote_path }} {{ stack_name }}
  register: stack_deploy_result
  changed_when: true

- name: Print scale-in result
  when: inventory_hostname == hostvars['localhost'].swarm_leader_hostname
  debug:
    msg: >-
      down л…ёл“ң м ңкұ° мҷ„лЈҢ, {{ stack_service_name }} replicas вҶ’
      {{ updated_stack_yaml.services[stack_service_name].deploy.replicas }}
