---
restore_wait_for_connection_timeout: 300

# 새로 조인시킬 워커의 IP (필수, -e로 지정)
# 예: -e worker_ip=192.168.1.200
# 인벤토리에 미리 등록할 필요 없습니다. add_host로 실행 중 임시 등록합니다.
worker_ip: ""

# stack 파일의 원본(source of truth)은 Ansible 저장소 안에 있습니다
# (roles/swarm/deploy/files/stack.yml 을 매 배포 시 원격 /tmp로 복사하는 기존 방식과 동일)
stack_file_repo_path: "{{ playbook_dir }}/roles/swarm/deploy/files/stack.yml"
stack_file_remote_path: /tmp/stack.yml
stack_name: board
stack_service_name: board
