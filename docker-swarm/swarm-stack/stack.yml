version: '3.8'
services:
  board:
    image: ${BOARD_IMAGE:-jaeyun1/board:blue}
    ports:
      - target: 3000
        published: 80
        mode: host
    environment:
      PORT: 3000
      HOST: 0.0.0.0
    secrets:
      - source: db_type
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_primary_host
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_primary_port
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_user
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_password
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_name
        mode: 0440
        uid: '0'
        gid: '1000'
      - source: db_replica_hosts
        mode: 0440
        uid: '0'
        gid: '1000'
    deploy:
      mode: replicated
      replicas: 2
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.labels.role == was
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
secrets:
  db_type:
    external: true
  db_primary_host:
    external: true
  db_primary_port:
    external: true
  db_user:
    external: true
  db_password:
    external: true
  db_name:
    external: true
  db_replica_hosts:
    external: true
