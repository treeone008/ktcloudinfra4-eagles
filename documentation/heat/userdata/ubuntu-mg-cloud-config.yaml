#cloud-config
# Heat str_replace: __NODE_IP__ __NODE_GW__ __SSH_PUBKEY__

ssh_pwauth: true
chpasswd:
  list: |
    ubuntu:ubuntu
  expire: false

ssh_authorized_keys:
  - __SSH_PUBKEY__

# OpenStack metadata 실패(DataSourceNone) 대비 — 네트워크 cloud-init에 직접
network:
  version: 2
  ethernets:
    primary:
      match:
        name: "en*"
      dhcp4: false
      addresses:
        - __NODE_IP__/24
      routes:
        - to: default
          via: __NODE_GW__
      nameservers:
        addresses: [8.8.8.8, 1.1.1.1]

package_update: false
packages:
  - wget
  - curl
  - tar

write_files:
  - path: /usr/local/bin/stress-cpu.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      PIDFILE=/tmp/stress-cpu.pids
      case "$1" in
        start)
          N="${2:-1}"
          for ((i=0; i<N; i++)); do
            yes >/dev/null &
            echo $! >> "$PIDFILE"
          done
          echo "CPU stress started: ${N}"
          ;;
        stop)
          if [[ -f "$PIDFILE" ]]; then
            while read -r p; do kill "$p" 2>/dev/null; done < "$PIDFILE"
            rm -f "$PIDFILE"
          fi
          pkill -f "^yes$" 2>/dev/null || true
          echo "CPU stress stopped"
          ;;
        status)
          [[ -f "$PIDFILE" ]] && wc -l < "$PIDFILE" || echo 0
          ;;
        *) echo "usage: $0 start [N]|stop|status"; exit 1 ;;
      esac

  - path: /etc/systemd/system/node_exporter.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/node_exporter --web.listen-address=0.0.0.0:9100
      Restart=always

      [Install]
      WantedBy=multi-user.target

runcmd:
  - |
    set -ex
    NE_VER=1.8.2
    MIRROR=http://172.16.8.110:8888/node_exporter.tar.gz
    GH=https://github.com/prometheus/node_exporter/releases/download/v${NE_VER}/node_exporter-${NE_VER}.linux-amd64.tar.gz
    cd /tmp
    wget -q -O ne.tar.gz "$MIRROR" || curl -fsSL -o ne.tar.gz "$GH"
    tar xzf ne.tar.gz
    install -m 755 node_exporter-${NE_VER}.linux-amd64/node_exporter /usr/local/bin/node_exporter
    systemctl daemon-reload
    systemctl enable --now node_exporter
    echo ok > /var/log/swarm-mg-cloud-init.done
