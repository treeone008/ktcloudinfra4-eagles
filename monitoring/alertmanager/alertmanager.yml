global:
  resolve_timeout: 5m

  smtp_smarthost: smtp.gmail.com:587
  smtp_from: treeone898@gmail.com
  smtp_auth_username: treeone898@gmail.com
  smtp_auth_password_file: /run/secrets/gmail_app_password
  smtp_require_tls: true

route:
  receiver: team-alert-receiver

  group_by:
    - alertname
    - node

  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h

  routes:
    - match:
        action: scale_up
      receiver: heat-scale-up
      group_wait: 0s
      group_interval: 5m
      repeat_interval: 1h
      continue: true

    - match:
        action: scale_down
      receiver: heat-scale-down
      group_wait: 0s
      group_interval: 5m
      repeat_interval: 1h
      continue: true

    # continue:true는 sibling만 탐색 → scale 알람도 Gmail/Slack 보내려면 별도 route
    - match_re:
        action: scale_up|scale_down
      receiver: team-alert-receiver
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 4h

receivers:
  - name: heat-scale-up
    webhook_configs:
      - url: http://172.16.8.200:8080/scale/up
        send_resolved: false

  - name: heat-scale-down
    webhook_configs:
      - url: http://172.16.8.200:8080/scale/down
        send_resolved: false

  - name: team-alert-receiver
    email_configs:
      - to: treeone898@gmail.com
        send_resolved: true

        headers:
          Subject: '[Cloud Monitoring] {{ .Status }} - {{ .CommonLabels.alertname }} - {{ .CommonLabels.node }}'

        text: |
          상태: {{ .Status }}
          프로젝트: Cloud Monitoring

          {{ range .Alerts }}
          경고명: {{ .Labels.alertname }}
          대상 노드: {{ .Labels.node }}
          심각도: {{ .Labels.severity }}
          요약: {{ .Annotations.summary }}
          설명: {{ .Annotations.description }}
          시작 시각: {{ .StartsAt }}
          {{ end }}

    slack_configs:
      - api_url_file: /run/secrets/slack_webhook_url
        send_resolved: true
        title: '[Cloud Monitoring] {{ .Status }} - {{ .CommonLabels.alertname }} - {{ .CommonLabels.node }}'
        text: |
          *상태:* {{ .Status }}
          *프로젝트:* Cloud Monitoring

          {{ range .Alerts }}
          *경고명:* {{ .Labels.alertname }}
          *대상 노드:* {{ .Labels.node }}
          *심각도:* {{ .Labels.severity }}
          *요약:* {{ .Annotations.summary }}
          *설명:* {{ .Annotations.description }}
          *시작 시각:* {{ .StartsAt }}
          {{ end }}
