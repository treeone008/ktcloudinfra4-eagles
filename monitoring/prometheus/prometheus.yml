global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          node: monitor-01
          role: monitoring
          layer: monitoring-stack

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          node: monitor-01
          role: monitoring
          layer: monitoring-stack

  - job_name: openstack-node
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/openstack_nodes.yml
        refresh_interval: 30s

  - job_name: mysql
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/mysql.yml
        refresh_interval: 30s

  - job_name: cadvisor
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/cadvisor.yml
        refresh_interval: 30s

  - job_name: maxscale
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/maxscale.yml
        refresh_interval: 30s