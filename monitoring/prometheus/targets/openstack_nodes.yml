# =========================
# OpenStack infra / host nodes
# all-in-one: 172.16.8.100 | monitoring stack: mgmt 172.16.8.200
# =========================

- targets:
    - 172.16.8.200:9100
  labels:
    node: mgmt
    role: management
    layer: external-openstack

- targets:
    - 172.16.8.100:9100
  labels:
    node: allinone
    role: allinone
    layer: openstack-host


# =========================
# OpenStack instances - Web / Swarm
# webserver subnet: 192.168.1.0/24
# =========================

- targets:
    - 192.168.1.20:9100
  labels:
    node: web1
    role: web
    layer: openstack-instance

- targets:
    - 192.168.1.21:9100
  labels:
    node: web2
    role: web
    layer: openstack-instance

- targets:
    - 192.168.1.22:9100
  labels:
    node: web3
    role: web
    layer: openstack-instance

# Heat Swarm workers (192.168.1.23~27, worker_count 1~5)
- targets:
    - 192.168.1.23:9100
  labels:
    node: worker-01
    role: swarm-worker
    layer: openstack-instance

- targets:
    - 192.168.1.24:9100
  labels:
    node: worker-02
    role: swarm-worker
    layer: openstack-instance

- targets:
    - 192.168.1.25:9100
  labels:
    node: worker-03
    role: swarm-worker
    layer: openstack-instance


# =========================
# OpenStack instances - DB
# =========================

- targets:
    - 192.168.101.31:9100
  labels:
    node: db01
    role: database
    layer: openstack-instance
    db_role: primary

- targets:
    - 192.168.101.32:9100
  labels:
    node: db02
    role: database
    layer: openstack-instance
    db_role: replica

- targets:
    - 192.168.101.40:9100
  labels:
    node: db_proxy-01
    role: db-proxy
    layer: openstack-instance

- targets:
    - 192.168.101.41:9100
  labels:
    node: db-proxy-02
    role: db-proxy
    layer: openstack-instance